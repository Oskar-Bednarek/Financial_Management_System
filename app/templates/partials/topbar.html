<header class="topbar flex items-center justify-between px-4 py-2" style="background-color: rgba(232, 218, 239, 0.8); backdrop-filter: blur(8px); box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.2);">
  
    <!-- Center: Day and Date -->
    <div class="flex-1 text-right pr-4 text-[#98208f]">
        <span id="date" class="font-medium"></span>
    </div>

    <!-- Right: Theme and Language Switcher -->
    <div class="flex items-center space-x-4">
        <!-- Theme Switcher Button -->
        <button id="theme-toggle" class="w-10 h-10 flex items-center justify-center text-[#98208f] ml-2">
            <i id="theme-icon" class="fa-solid fa-moon text-lg"></i>
        </button>

        <!-- Language Switcher -->
        <button id="language-switcher" class="text-[#98208f] min-w-[40px] text-center font-bold">
            ENG
        </button>
    </div>

</header>
